name: auction-watcher

on:
  workflow_dispatch:
  schedule:
    - cron: '5 20 * * *'      # 05:05 JST（朝）
    - cron: '5 8 * * *'       # 17:05 JST（夕方）

jobs:
  auction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mercapi gspread google-auth requests tzdata
      - run: python auction_watcher.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
